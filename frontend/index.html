    <style>

    <!-- SCROLL FIX — runs BEFORE React, fixes overflow without breaking Lenis smooth scroll -->
    <script>
      (function(){
        // Fix scroll WITHOUT removing Lenis classes (Lenis needs its classes to work)
        // Only remove overflow:hidden from body when NO modal is open
        function fix(){
          var h=document.documentElement, b=document.body;
          // NOTE: Do NOT remove lenis/lenis-smooth classes — Lenis needs them for smooth scroll
          // Only fix height constraints that block scrolling
          h.style.setProperty('height','auto','important');
          h.style.setProperty('max-height','none','important');
          b.style.setProperty('height','auto','important');
          b.style.setProperty('max-height','none','important');
          var r=document.getElementById('root');
          if(r){
            r.style.setProperty('overflow','visible','important');
            r.style.setProperty('height','auto','important');
            r.style.setProperty('max-height','none','important');
          }
          // Only fix overflow if body has overflow:hidden AND no modal is open
          var hasModal = document.querySelector("[role='dialog']") || document.querySelector("[aria-modal='true']");
          if(!hasModal && b.style.overflow === 'hidden'){
            b.style.removeProperty('overflow');
            b.style.removeProperty('overflow-y');
          }
        }
        // Run a few times at startup (not forever — prevents Lenis conflict)
        fix();
        setTimeout(fix, 100);
        setTimeout(fix, 500);
        setTimeout(fix, 1500);
        // Watch only for body overflow:hidden changes (from modals), not Lenis class changes
        if(window.MutationObserver){
          var obs=new MutationObserver(function(muts){
            for(var i=0;i<muts.length;i++){
              var m=muts[i];
              if(m.attributeName==='style' && m.target === document.body){
                var hasModal2 = document.querySelector("[role='dialog']") || document.querySelector("[aria-modal='true']");
                if(!hasModal2 && document.body.style.overflow === 'hidden'){
                  setTimeout(function(){ document.body.style.removeProperty('overflow'); }, 50);
                }
              }
            }
          });
          if(document.body){
            obs.observe(document.body,{attributes:true,attributeFilter:['style']});
          } else {
            document.addEventListener('DOMContentLoaded',function(){
              obs.observe(document.body,{attributes:true,attributeFilter:['style']});
            });
          }
        }
      })();
    </script>
