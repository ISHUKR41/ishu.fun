# render.yaml — Render deployment config for ISHU Backend
services:
  - type: web
    name: ishu-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: apt-get install -y libreoffice ghostscript && curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp && chmod a+rx /usr/local/bin/yt-dlp && npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        value: https://ishu.fun
